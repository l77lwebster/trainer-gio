<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Black background -->
  <rect width="200" height="200" fill="#111111"/>

  <!-- TRAINER (bold, white, condensed) -->
  <text
    x="100" y="82"
    font-family="Impact, 'Arial Black', Arial"
    font-size="44"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="3"
  >TRAINER</text>

  <!-- Red diagonal slash lines -->
  <polygon points="22,96  178,88  178,94  22,102" fill="#a01828"/>
  <polygon points="22,103 178,95  178,100 22,108" fill="#c0392b" opacity="0.5"/>

  <!-- Left dumbbell: plates + bar -->
  <!-- outer plate -->
  <rect x="14" y="125" width="5"  height="36" rx="2" fill="white"/>
  <!-- inner plate -->
  <rect x="19" y="129" width="9"  height="28" rx="2" fill="white"/>
  <!-- left bar -->
  <rect x="28" y="136" width="22" height="8"  rx="2" fill="white"/>

  <!-- GIO text -->
  <text
    x="100" y="160"
    font-family="Impact, 'Arial Black', Arial"
    font-size="50"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="4"
  >GIO</text>

  <!-- Right dumbbell: bar + plates -->
  <!-- right bar -->
  <rect x="150" y="136" width="22" height="8"  rx="2" fill="white"/>
  <!-- inner plate -->
  <rect x="172" y="129" width="9"  height="28" rx="2" fill="white"/>
  <!-- outer plate -->
  <rect x="181" y="125" width="5"  height="36" rx="2" fill="white"/>
</svg>
